services:
  relay:
    build:
      context: .
      dockerfile: Dockerfile
    image: mavlink-relay-server:test
    networks:
      - relay-test-net
    volumes:
      - ./certs:/certs:ro
    environment:
      - RELAY_DB=/data/relay.db
      - RELAY_CERT_PATH=/certs/cert.pem
      - RELAY_KEY_PATH=/certs/key.pem
      - LOG_LEVEL=DEBUG
      - LOG_FORMAT=text
      - VEHICLE_TOKEN=AAAAAAAAAAAAAAAAAAAAAA==
      - VEHICLE_ID=BB_000001
      - GCS_TOKEN=u7u7u7u7u7u7u7u7u7u7uw==
      - GCS_ID=GCS_000001
      - GCS_ALLOWED_VEHICLE=BB_000001

  test-client:
    build:
      context: .
      dockerfile: tests/integration/Dockerfile.test
    networks:
      - relay-test-net
    environment:
      - RELAY_HOST=relay
      - RELAY_PORT=14550
    depends_on:
      - relay
    command: ["sh", "-c", "sleep 5 && python test_client.py"]

networks:
  relay-test-net:
    driver: bridge
